name: app tests

on:
  push:
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'seeds/**'
      - 'supabase/**'
      - 'api/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/app-tests.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'seeds/**'
      - 'supabase/**'
      - 'api/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/app-tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: node --test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high
