<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Setlist · Sala de Ensayo</title>
<style>
  :root {
    --bg: #0e0e0e;
    --bg-elev: #1a1a1a;
    --bg-elev-2: #242424;
    --ink: #f5f1e8;
    --ink-dim: #8a8580;
    --accent: #ff5722;
    --accent-soft: #ff572233;
    --border: #2a2a2a;
    --mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
    --serif: 'Georgia', 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 0%, #ff572215 0%, transparent 40%),
      radial-gradient(circle at 80% 100%, #ff572210 0%, transparent 40%);
    background-attachment: fixed;
  }

  .app { max-width: 720px; margin: 0 auto; padding: 24px 20px 80px; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 24px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(36px, 8vw, 56px);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  h1 .ampersand { color: var(--accent); font-style: italic; }
  .subtitle {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-dim);
    margin-top: 12px;
  }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 20px; }
  .search {
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    padding: 14px 16px 14px 42px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--ink-dim); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-dim);
    pointer-events: none;
  }

  /* SETLIST */
  .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }

  ol.songs { list-style: none; }
  .song-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s, padding-left 0.15s;
  }
  .song-item:hover { background: var(--bg-elev); padding-left: 12px; }
  .song-item:active { background: var(--bg-elev-2); }

  .song-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    min-width: 24px;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .song-artist {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .song-key {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .song-arrow { color: var(--ink-dim); font-size: 18px; }

  /* SONG VIEW */
  .hidden { display: none !important; }

  .back-btn {
    background: none;
    border: none;
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    padding: 8px 0;
    margin-bottom: 16px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--accent); }

  .song-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  .song-header h2 {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(28px, 6vw, 40px);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .song-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .song-meta .dot { width: 3px; height: 3px; background: var(--ink-dim); border-radius: 50%; }
  .song-meta .key-tag {
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 10px;
    border-radius: 2px;
  }

  .section {
    margin-bottom: 32px;
  }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.25em;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .structure {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--ink);
    background: var(--bg-elev);
    padding: 16px;
    border-left: 2px solid var(--accent);
    white-space: pre-wrap;
  }

  .chords-block {
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
    background: var(--bg-elev);
    padding: 16px;
    border-radius: 2px;
    overflow-x: auto;
    white-space: pre;
  }
  .chord { color: var(--accent); font-weight: 600; }

  .tabs-block {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    background: var(--bg-elev);
    padding: 16px;
    border-radius: 2px;
    overflow-x: auto;
    white-space: pre;
    color: var(--ink);
  }
  .tab-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .tab-title:first-child { margin-top: 0; }

  .lyrics-block {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--ink);
  }
  .lyrics-placeholder {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-dim);
    font-style: italic;
    padding: 16px;
    background: var(--bg-elev);
    border: 1px dashed var(--border);
    border-radius: 2px;
  }

  .notes-block {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink-dim);
    background: var(--bg-elev);
    padding: 14px 16px;
    border-radius: 2px;
    border-left: 2px solid var(--ink-dim);
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* FLOATING ADD HINT */
  .hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-dim);
    background: var(--bg-elev);
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .app { padding: 16px 14px 80px; }
    .song-item { padding: 12px 4px; gap: 12px; }
    .hint { display: none; }
  }
</style>
</head>

/* ============================================================
   LÓGICA — no hace falta tocar de acá para abajo
   ============================================================ */

const listView = document.getElementById('list-view');
const songView = document.getElementById('song-view');
const songList = document.getElementById('song-list');
const searchInput = document.getElementById('search');
const countEl = document.getElementById('count');

function renderList(filter = '') {
  const f = filter.toLowerCase().trim();
  const filtered = SONGS.filter(s =>
    s.title.toLowerCase().includes(f) ||
    s.artist.toLowerCase().includes(f)
  );

  countEl.textContent = `${filtered.length} canci${filtered.length === 1 ? 'ón' : 'ones'}`;

  songList.innerHTML = filtered.map((s, i) => {
    const originalIdx = SONGS.indexOf(s);
    return `
      <li class="song-item" data-idx="${originalIdx}">
        <div class="song-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="song-info">
          <div class="song-title">${escapeHtml(s.title)}</div>
          <div class="song-artist">${escapeHtml(s.artist)}</div>
        </div>
        <div class="song-key">${escapeHtml(s.key)}</div>
        <div class="song-arrow">→</div>
      </li>
    `;
  }).join('');

  if (filtered.length === 0) {
    songList.innerHTML = '<div class="empty">Sin resultados</div>';
  }

  document.querySelectorAll('.song-item').forEach(el => {
    el.addEventListener('click', () => openSong(parseInt(el.dataset.idx)));
  });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function highlightChords(progression) {
  // Highlight chord names with accent color
  return escapeHtml(progression).replace(
    /\b([A-G][#b]?(?:maj|min|m|sus|dim|aug|add)?\d*(?:\/[A-G][#b]?)?)\b/g,
    '<span class="chord">$1</span>'
  );
}

function openSong(idx) {
  const s = SONGS[idx];
  const tabsHtml = s.tabs && s.tabs.length
    ? s.tabs.map(t => `
        <div class="tab-title">${escapeHtml(t.title)}</div>
        <div class="tabs-block">${escapeHtml(t.tab)}</div>
      `).join('')
    : '<div class="lyrics-placeholder">Sin tabs cargadas</div>';

  const lyricsHtml = s.lyrics && s.lyrics.trim()
    ? `<div class="lyrics-block">${escapeHtml(s.lyrics)}</div>`
    : `<div class="lyrics-placeholder">Pegá la letra acá: editá el archivo HTML y completá el campo "lyrics" de esta canción.</div>`;

  songView.innerHTML = `
    <button class="back-btn" id="back-btn">← Volver al setlist</button>
    <div class="song-header">
      <h2>${escapeHtml(s.title)}</h2>
      <div class="song-meta">
        <span>${escapeHtml(s.artist)}</span>
        <span class="dot"></span>
        <span class="key-tag">${escapeHtml(s.key)}</span>
        ${s.tempo ? `<span class="dot"></span><span>${escapeHtml(s.tempo)}</span>` : ''}
      </div>
    </div>

    ${s.structure ? `
      <div class="section">
        <div class="section-label">Estructura</div>
        <div class="structure">${escapeHtml(s.structure)}</div>
      </div>
    ` : ''}

    ${s.progression ? `
      <div class="section">
        <div class="section-label">Progresión</div>
        <div class="chords-block">${highlightChords(s.progression)}</div>
      </div>
    ` : ''}

    <div class="section">
      <div class="section-label">Tabs / Riffs</div>
      ${tabsHtml}
    </div>

    <div class="section">
      <div class="section-label">Letra</div>
      ${lyricsHtml}
    </div>

    ${s.notes ? `
      <div class="section">
        <div class="section-label">Notas</div>
        <div class="notes-block">${escapeHtml(s.notes)}</div>
      </div>
    ` : ''}
  `;

  document.getElementById('back-btn').addEventListener('click', closeSong);

  listView.classList.add('hidden');
  songView.classList.remove('hidden');
  window.scrollTo(0, 0);
}

function closeSong() {
  songView.classList.add('hidden');
  listView.classList.remove('hidden');
  window.scrollTo(0, 0);
}

searchInput.addEventListener('input', e => renderList(e.target.value));

// Browser back button
window.addEventListener('popstate', () => {
  if (!songView.classList.contains('hidden')) closeSong();
});

// Initial render
renderList();
</script>
